name: Build addon zips and release

# Runs PARALLEL to the legacy quickfix mechanism. It never touches it.
#
# What it does:
#   1. Detects which addon folder(s) changed in the push (or all, on a
#      manual / seed run).
#   2. Packages each changed addon into a valid, deterministic Kodi zip
#      (<id>-<version>.zip).
#   3. Publishes them to a single rolling GitHub Release (tag: addons-latest),
#      replacing the old zip of that addon (old versions are deleted).
#   4. Regenerates manifest.json from the live addon.xml files and commits it.

on:
  push:
    branches: [main]
    # Trigger only when an actual addon folder changes. Kodi addon ids are
    # always prefixed by their kind, so these globs cover all 8 addons (and
    # any future one) while ignoring manifest.json, README, .github, etc.
    paths:
      - "plugin.*/**"
      - "repository.*/**"
      - "script.*/**"
      - "service.*/**"
      - "skin.*/**"
      - "userdata/**"
  workflow_dispatch: {}

permissions:
  contents: write

# Never run two releases at once: they share one rolling release + manifest.
concurrency:
  group: build-and-release
  cancel-in-progress: false

env:
  RELEASE_TAG: addons-latest
  REPO: ${{ github.repository }}
  GH_TOKEN: ${{ github.token }}

jobs:
  build-and-release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout (full history for diff)
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Detect changed addons
        id: detect
        run: |
          set -euo pipefail
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            IDS=$(python .github/scripts/list_changed.py all)
          else
            IDS=$(python .github/scripts/list_changed.py diff "${{ github.event.before }}" "${{ github.sha }}")
          fi
          echo "Changed addons:"
          echo "${IDS:-<none>}"
          JOINED=$(printf '%s' "$IDS" | tr '\n' ' ' | sed -e 's/^ *//' -e 's/ *$//')
          echo "ids=$JOINED" >> "$GITHUB_OUTPUT"
          if [ -z "$JOINED" ]; then
            echo "any=false" >> "$GITHUB_OUTPUT"
          else
            echo "any=true" >> "$GITHUB_OUTPUT"
          fi

          # Detect a build-config (userdata/) change independently of addons.
          # Manual runs always rebuild the config; pushes rebuild it only when
          # a file under userdata/ actually changed.
          CONFIG_CHANGED=false
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            CONFIG_CHANGED=true
          elif git diff --name-only "${{ github.event.before }}" "${{ github.sha }}" 2>/dev/null \
                 | grep -qE '^userdata/'; then
            CONFIG_CHANGED=true
          fi
          echo "config=$CONFIG_CHANGED" >> "$GITHUB_OUTPUT"

          if [ "$JOINED" != "" ] || [ "$CONFIG_CHANGED" = "true" ]; then
            echo "proceed=true" >> "$GITHUB_OUTPUT"
          else
            echo "proceed=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Build addon zips
        if: steps.detect.outputs.any == 'true'
        run: |
          set -euo pipefail
          python .github/scripts/build_addons.py ${{ steps.detect.outputs.ids }}
          # Publish a STABLE-named copy of the wizard zip for the permanent
          # install link (...-latest.zip). The versioned zip stays alongside it
          # so the manifest can still drive update detection.
          WIZ=$(ls dist/plugin.program.kodipovilwizard-*.zip 2>/dev/null \
                  | grep -vE -- '-latest\.zip$' || true)
          if [ -n "$WIZ" ]; then
            cp "$WIZ" dist/plugin.program.kodipovilwizard-latest.zip
            echo "Created stable wizard copy: plugin.program.kodipovilwizard-latest.zip"
          fi
          echo "--- dist ---"
          ls -la dist/

      - name: Build config zip
        if: steps.detect.outputs.config == 'true'
        run: |
          set -euo pipefail
          python .github/scripts/build_config.py
          echo "--- dist ---"
          ls -la dist/

      - name: Publish to rolling release
        if: steps.detect.outputs.proceed == 'true'
        run: |
          set -euo pipefail
          TAG="$RELEASE_TAG"

          # Ensure the rolling release exists.
          if ! gh release view "$TAG" >/dev/null 2>&1; then
            echo "Creating release $TAG"
            gh release create "$TAG" \
              --title "POV IL Addons (latest)" \
              --notes "Rolling release that always holds the current zip of every addon. Updated automatically by CI; consumed via manifest.json." \
              --target main
          fi

          # For each changed addon, delete its previous (any-version) asset so
          # only the current zip remains, then upload the freshly built zips.
          # NOTE: ...-latest.zip is excluded from deletion -- it is a stable
          # pointer that we simply overwrite (--clobber) with the new build.
          for id in ${{ steps.detect.outputs.ids }}; do
            OLD=$(gh release view "$TAG" --json assets -q ".assets[].name" 2>/dev/null \
                    | grep -E "^${id}-.*\.zip$" | grep -vE -- '-latest\.zip$' || true)
            for asset in $OLD; do
              echo "Removing stale asset: $asset"
              gh release delete-asset "$TAG" "$asset" -y || true
            done
          done

          # Drop stale config-<oldversion>.zip when the config version moved.
          if [ "${{ steps.detect.outputs.config }}" = "true" ]; then
            OLDCFG=$(gh release view "$TAG" --json assets -q ".assets[].name" 2>/dev/null \
                       | grep -E "^config-.*\.zip$" || true)
            for asset in $OLDCFG; do
              echo "Removing stale config asset: $asset"
              gh release delete-asset "$TAG" "$asset" -y || true
            done
          fi

          echo "Uploading new zips:"
          gh release upload "$TAG" dist/*.zip --clobber

      - name: Regenerate manifest.json
        if: steps.detect.outputs.proceed == 'true'
        run: |
          set -euo pipefail
          python .github/scripts/gen_manifest.py

      - name: Prune orphaned release assets
        if: steps.detect.outputs.proceed == 'true'
        run: |
          set -euo pipefail
          TAG="$RELEASE_TAG"
          # The per-addon delete in "Publish to rolling release" only runs for
          # addons that CHANGED this run, so the last zip of an addon whose folder
          # was DELETED from the repo (e.g. service.subtitles.All_Subs,
          # repository.peno64) would otherwise linger on the release forever.
          # Here we reconcile against the freshly regenerated manifest: anything
          # not referenced by it (and not a stable *-latest.zip pointer) is an
          # orphan and gets removed, keeping the release footprint lean.
          ASSETS=$(gh release view "$TAG" --json assets -q '.assets[].name' 2>/dev/null || true)
          ORPHANS=$(python - "$ASSETS" <<'PY'
          import json, sys
          assets = [a for a in (sys.argv[1] if len(sys.argv) > 1 else '').split() if a]
          manifest = json.load(open('manifest.json'))
          allowed = set()
          for addon in manifest.get('addons', {}).values():
              if addon.get('filename'):
                  allowed.add(addon['filename'])
          cfg = manifest.get('config') or {}
          if cfg.get('filename'):
              allowed.add(cfg['filename'])
          for name in assets:
              if name.endswith('-latest.zip'):   # stable rolling pointers -- never prune
                  continue
              if name not in allowed:
                  print(name)
          PY
          )
          if [ -z "${ORPHANS//[[:space:]]/}" ]; then
            echo "No orphaned assets to prune."
          else
            for asset in $ORPHANS; do
              echo "Pruning orphaned asset: $asset"
              gh release delete-asset "$TAG" "$asset" -y || true
            done
          fi

      - name: Commit manifest.json
        if: steps.detect.outputs.proceed == 'true'
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add manifest.json
          if git diff --cached --quiet; then
            echo "manifest.json unchanged -- nothing to commit"
            exit 0
          fi
          git commit -m "chore(manifest): update addon manifest [skip ci]"
          BRANCH="${{ github.ref_name }}"
          # Retry once after rebasing in case another commit landed meanwhile.
          if ! git push origin "HEAD:${BRANCH}"; then
            git pull --rebase origin "${BRANCH}"
            git push origin "HEAD:${BRANCH}"
          fi
